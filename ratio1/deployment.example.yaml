# Example descriptor. Adapt field names to the active Ratio1 Worker App Runner deployment schema.
name: nis2compass-site
source:
  type: git
  repository: https://github.com/SmartCloverAI/NIS2COMPASS.git
  branch: main
  clone: full-repository
runtime:
  runner: worker_app_runner
  working_directory: .
  base_runtime: nodejs-22-alpine
  # Optional separate build phase, if the active WAR schema requires one: ./start-website.sh build
  start_command: ./start-website.sh
  port: 8080
resources:
  cpu: 0.5
  memory: 512Mi
  disk: 2Gi
env:
  NODE_ENV: production
  # WAR/CAR should inject EE_HOST_ID dynamically; do not hard-code an edge-node identity here.
